{% extends 'store/base.html' %}
{% block content %}
<div class="container" style="max-width: 450px; margin: 50px auto;">
    <div style="background: #ffffff; padding: 30px; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); border: 1px solid #e0e0e0;">
        <h3 style="font-weight: 700; color: #212121; margin-bottom: 10px;">Reset Password</h3>
        <p style="color: #666; font-size: 13px; margin-bottom: 20px;">Provide your registered account email address below, and we will dispatch a secure validation password link string.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group" style="margin-bottom: 20px;">
                <input type="email" name="email" class="form-control" placeholder="Enter your email address" required style="height: 42px;">
            </div>
            <button type="submit" class="btn btn-block" style="background: #2874f0; color: white; font-weight: 700; height: 42px;">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
