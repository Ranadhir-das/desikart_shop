{% extends 'store/base.html' %}

{% block content %}
<div class="container" style="max-width: 450px; margin: 50px auto;">
    <div style="background: #ffffff; padding: 30px; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); border: 1px solid #e0e0e0;">
        <h3 style="font-weight: 700; color: #212121; margin-bottom: 5px;">Verify & Complete</h3>
        <p style="color: #666; font-size: 13px; margin-bottom: 25px;">Code sent safely to <strong>{{ email }}</strong></p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger" style="font-size: 13px; padding: 8px 12px; margin-bottom: 15px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'verify_and_register' %}">
            {% csrf_token %}
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: 600; color: #555; display: block; margin-bottom: 6px;">6-Digit OTP</label>
                <input type="text" name="otp" class="form-control" placeholder="Enter 6-digit code" required style="height: 40px; font-weight: 700; text-align: center; letter-spacing: 2px;">
            </div>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="font-weight: 600; color: #555; display: block; margin-bottom: 6px;">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Your name" required style="height: 40px; border-radius: 2px;">
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="font-weight: 600; color: #555; display: block; margin-bottom: 6px;">Choose Password</label>
                <input type="password" name="password" class="form-control" placeholder="Choose a password" required style="height: 40px; border-radius: 2px;">
            </div>
            
            <button type="submit" class="btn btn-block" style="background: #2874f0; color: white; font-weight: 700; height: 42px; text-transform: uppercase; border: none; border-radius: 2px;">
                Verify and Create Account
            </button>
        </form>
    </div>
</div>
{% endblock %}
