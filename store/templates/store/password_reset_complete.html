{% extends 'store/base.html' %}
{% block content %}
<div class="container" style="max-width: 450px; margin: 50px auto; text-align: center;">
    <div style="background: #ffffff; padding: 40px 30px; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); border: 1px solid #e0e0e0;">
        <i class="fa fa-check-circle" style="font-size: 45px; color: #2ecc71; margin-bottom: 15px;"></i>
        <h3 style="font-weight: 700; margin-bottom: 10px;">Password Updated!</h3>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Your security password records have been updated successfully.</p>
        <a href="{% url 'user_login' %}" class="btn" style="background: #2874f0; color: white; font-weight: 700; padding: 8px 25px;">Login Now</a>
    </div>
</div>
{% endblock %}
