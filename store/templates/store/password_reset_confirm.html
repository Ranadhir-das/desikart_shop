{% extends 'store/base.html' %}
{% block content %}
<div class="container" style="max-width: 450px; margin: 50px auto;">
    <div style="background: #ffffff; padding: 30px; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); border: 1px solid #e0e0e0;">
        <h3 style="font-weight: 700; margin-bottom: 20px;">Choose New Password</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-block" style="background: #ff9f00; color: white; font-weight: 700; height: 42px; margin-top: 15px;">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
